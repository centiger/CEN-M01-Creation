*{box-sizing:border-box;-webkit-tap-highlight-color:transparent} html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,'Noto Sans KR','Apple SD Gothic Neo',sans-serif} button{font:inherit;color:inherit;border:0;background:none;cursor:pointer}.app{position:relative;width:100vw;height:100vh;min-height:560px;background:#09131e;overflow:hidden}.map{position:absolute;inset:0;background-image:linear-gradient(90deg,rgba(3,8,13,.18),rgba(3,8,13,.04) 50%,rgba(3,8,13,.35)),url('assets/creation-matrix-bg.png');background-size:cover;background-position:center}.shade{position:absolute;inset:0;background:radial-gradient(circle at 32% 28%,rgba(255,219,130,.13),transparent 28%),linear-gradient(to bottom,rgba(0,0,0,.05),rgba(0,0,0,.38))}.top{position:absolute;left:24px;right:24px;top:18px;display:flex;justify-content:space-between;align-items:flex-start;z-index:5}.title h1{margin:0;font-size:clamp(28px,3.2vw,50px);letter-spacing:-.04em;text-shadow:0 3px 12px rgba(0,0,0,.55)}.title p{margin:6px 0 0;color:#ffe0a0;font-size:clamp(15px,1.6vw,24px);font-weight:700}.title small{display:block;margin-top:6px;color:#f3d9a2}.topBtns{display:flex;gap:10px}.pill{height:44px;padding:0 18px;border:1px solid rgba(240,199,100,.45);background:rgba(0,0,0,.36);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.25);backdrop-filter:blur(6px)}.pill:hover{background:rgba(240,199,100,.16)}.node{position:absolute;z-index:4;display:flex;align-items:center;gap:10px;transform:translate(-50%,-50%)}.badge{position:absolute;left:-8px;top:-12px;width:32px;height:32px;border-radius:50%;display:grid;place-items:center;background:#e9d78a;color:#091018;font-weight:900;border:3px solid rgba(0,0,0,.7);box-shadow:0 4px 15px rgba(0,0,0,.55)}.orb{width:78px;height:78px;border-radius:50%;display:grid;place-items:center;font-size:34px;border:3px solid currentColor;background:radial-gradient(circle at 35% 25%,rgba(255,255,255,.45),rgba(0,0,0,.2) 42%,rgba(0,0,0,.55));box-shadow:0 0 0 4px rgba(0,0,0,.4),0 0 26px currentColor}.card{min-width:150px;max-width:210px;padding:13px 16px;background:rgba(6,12,16,.72);border:1px solid rgba(255,255,255,.18);border-radius:14px;box-shadow:0 12px 28px rgba(0,0,0,.35);backdrop-filter:blur(6px)}.card b{font-size:21px}.card ul{margin:6px 0 0;padding-left:16px;font-size:13px;line-height:1.55;color:#f3ead6}.n1{left:9%;top:30%;color:var(--blue)}.n2{left:52%;top:30%;color:var(--red)}.n3{left:64%;top:45%;color:var(--purple)}.n4{left:35%;top:63%;color:#7ed5ff}.n5{left:59%;top:63%;color:var(--orange)}.route{position:absolute;inset:0;z-index:3;pointer-events:none}.right{position:absolute;right:22px;top:84px;width:300px;bottom:98px;z-index:6;display:flex;flex-direction:column;gap:12px}.sideBox{background:var(--panel);border:1px solid rgba(240,199,100,.35);border-radius:14px;padding:14px;box-shadow:0 14px 34px rgba(0,0,0,.38);backdrop-filter:blur(7px)}.sideBox h2{font-size:18px;margin:0 0 12px;color:#ffe19a;text-align:center}.hubBtn{width:100%;min-height:74px;margin:8px 0;padding:10px 12px;display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08);border-radius:12px;text-align:left}.hubBtn:hover{background:rgba(240,199,100,.13);border-color:rgba(240,199,100,.4)}.hubIcon{width:52px;height:52px;flex:0 0 52px;border-radius:50%;display:grid;place-items:center;font-size:26px;border:2px solid currentColor;background:rgba(0,0,0,.32)}.hubTxt b{font-size:18px}.hubTxt small{display:block;margin-top:3px;color:#d5ccb6;line-height:1.35}.chev{margin-left:auto;color:#ceb985;font-size:28px}.links{font-size:13px;line-height:1.8;color:#e8dfcb}.links div{border-top:1px solid rgba(255,255,255,.08);padding:5px 0}.nextAge{position:absolute;left:49%;bottom:96px;z-index:5;transform:translateX(-50%);width:300px;text-align:center;padding:14px;background:rgba(4,8,12,.7);border:1px solid var(--gold);border-radius:16px;box-shadow:0 14px 30px rgba(0,0,0,.35)}.nextAge .star{font-size:40px;line-height:1;color:#ffdf72;text-shadow:0 0 20px #ffcf54}.nextAge b{display:block;margin-top:4px;color:#ffd065;font-size:20px}.bottom{position:absolute;left:18px;right:18px;bottom:16px;height:72px;z-index:7;display:grid;grid-template-columns:repeat(6,1fr);background:rgba(7,14,20,.82);border:1px solid rgba(240,199,100,.35);border-radius:12px;overflow:hidden;backdrop-filter:blur(8px)}.navItem{display:flex;align-items:center;justify-content:center;gap:10px;border-right:1px solid rgba(255,255,255,.13);color:#e8dcc4}.navItem:last-child{border-right:0}.navItem span:first-child{font-size:28px}.navItem b{font-size:15px}.navItem small{display:block;color:#bdb39e;font-size:11px;margin-top:2px}.modal{position:absolute;inset:0;z-index:20;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.58);backdrop-filter:blur(5px);padding:24px}.modal.open{display:flex}.modalPanel{width:min(920px,94vw);max-height:88vh;overflow:auto;background:linear-gradient(145deg,rgba(16,29,39,.97),rgba(7,11,16,.97));border:1px solid rgba(240,199,100,.45);border-radius:20px;box-shadow:0 30px 80px rgba(0,0,0,.6);padding:24px}.modalHead{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;border-bottom:1px solid rgba(255,255,255,.12);padding-bottom:14px;margin-bottom:16px}.modalHead h2{margin:0;color:#ffe09a;font-size:30px}.close{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);font-size:24px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.info{background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:16px}.info h3{margin:0 0 8px;color:#ffda83}.info p,.info li{color:#eee1c9;line-height:1.65}.info ul{margin:0;padding-left:18px}.full{grid-column:1/-1}.overview{line-height:1.75;color:#eee1c9}.hidden{display:none!important}@media(max-width:980px){.app{overflow:auto;min-width:980px}.right{right:16px;width:270px}.bottom{min-width:900px}.node .card{min-width:130px}.orb{width:64px;height:64px}.topBtns{display:none}}@media(max-height:700px){.right{top:74px;bottom:86px}.hubBtn{min-height:58px}.bottom{height:64px}.nextAge{bottom:82px}.card ul{display:none}}

<script>
const DATA={
  events:{creation:{t:'창조',s:'천지창조 · 하나님의 형상 · 안식',body:['하나님이 말씀으로 천지를 창조하신 사건입니다. 창조시대 전체의 출발점이며, 하나님이 세계와 인간의 주인이심을 보여줍니다.','인간은 하나님의 형상으로 창조되어 하나님과 교제하고 세상을 다스리는 사명을 받았습니다.'],links:['창조 → 새창조','에덴동산 → 새예루살렘','안식 → 하나님 나라의 완성']},fall:{t:'타락',s:'선악과 · 유혹 · 범죄와 추방',body:['인간이 하나님의 말씀을 거역하며 죄가 세상에 들어온 사건입니다. 에덴의 조화가 깨지고 인간은 하나님과의 관계, 사람과의 관계, 땅과의 관계에서 균열을 겪습니다.','그러나 하나님은 심판 중에도 여자의 후손을 통한 회복의 약속을 남기십니다.'],links:['타락 → 십자가','가죽옷 → 속죄','에덴 추방 → 회복의 여정']},cain:{t:'가인과 아벨',s:'첫 살인 · 죄의 확산 · 인간의 타락 심화',body:['가인의 살인은 죄가 개인의 불순종을 넘어 인간 사회 전체로 확산되었음을 보여줍니다.','창조세계의 질서가 무너지고 폭력과 두려움이 인간 역사 안에 깊이 들어옵니다.'],links:['가인 → 죄의 확산','아벨의 피 → 의인의 고난','심판 → 하나님의 공의']},flood:{t:'노아홍수',s:'심판 · 방주 · 무지개 언약',body:['온 땅에 가득한 죄악에 대한 하나님의 심판입니다. 동시에 노아와 가족을 방주 안에서 보존하신 구원의 사건입니다.','방주는 항해용 배라기보다 하나님이 준비하신 거대한 구원의 상자에 가깝습니다.'],links:['방주 → 구원','홍수 → 세례','무지개 → 언약']},babel:{t:'바벨탑',s:'교만 · 언어 혼잡 · 열방 분산',body:['인간이 하나님의 뜻을 거슬러 자기 이름을 내고 흩어지지 않으려 한 사건입니다. 하나님은 언어를 혼잡하게 하시고 사람들을 온 땅에 흩으십니다.','이후 하나님은 흩어진 열방을 향한 구속 계획의 시작으로 아브라함을 부르십니다.'],links:['바벨탑 → 오순절','열방 분산 → 세계선교','아브라함 소명 → 열방의 복']}},
  hubs:{create:{t:'창조 허브',s:'창조의 시작과 하나님의 완전하신 계획',items:['천지창조','하나님의 형상','에덴동산','안식일'],meaning:'하나님이 모든 것의 창조주이시며, 인간은 하나님의 형상으로 창조되어 하나님과 교제하고 세상을 돌보는 사명을 받았음을 보여줍니다.',explore:['창조 → 새창조','에덴동산 → 성막 · 성전','안식 → 하나님 나라의 완성']},fall:{t:'타락 허브',s:'죄의 시작과 에덴에서의 추방',items:['선악과','뱀의 유혹','범죄','에덴 추방'],meaning:'타락은 인간이 하나님 중심의 질서를 거부하고 자기 기준으로 선악을 판단하려 한 사건입니다. 이후 성경 전체는 이 깨어진 관계를 회복하는 이야기로 전개됩니다.',explore:['타락 → 십자가','가죽옷 → 속죄','추방 → 회복']},judge:{t:'심판 허브',s:'죄의 확산과 하나님의 공의',items:['가인과 아벨','홍수 심판','바벨탑 사건'],meaning:'창조 이후 죄는 개인, 가정, 사회, 문명 전체로 확산됩니다. 하나님은 죄를 방치하지 않으시며 공의롭게 심판하십니다.',explore:['가인 → 죄의 확산','홍수 → 심판과 구원','바벨탑 → 인간 문명의 교만']},covenant:{t:'언약 허브',s:'심판 중에도 남겨진 하나님의 약속',items:['여자의 후손','가죽옷','노아 언약','무지개'],meaning:'창조시대의 언약은 절망 속에서도 하나님이 구속의 길을 여신다는 사실을 보여줍니다. 심판은 끝이 아니라 회복을 향한 통로가 됩니다.',explore:['여자의 후손 → 메시아','노아 언약 → 보존의 은혜','새언약 → 완전한 회복']},nations:{t:'열방 허브',s:'바벨탑 이후 흩어진 민족과 하나님의 다음 계획',items:['열국표','바벨탑','언어 혼잡','민족 분산'],meaning:'바벨탑은 인간의 자기중심적 문명 건설을 보여줍니다. 그러나 흩어진 열방은 버려진 것이 아니라, 아브라함을 통해 복을 받을 대상이 됩니다.',explore:['바벨탑 → 오순절','열방 분산 → 세계선교','아브라함 → 열방의 복']}}
};
const modal=document.getElementById('modal'), title=document.getElementById('modalTitle'), sub=document.getElementById('modalSub'), body=document.getElementById('modalBody');
function openModal(t,s,html){title.textContent=t;sub.textContent=s||'';body.innerHTML=html;modal.classList.add('open');history.pushState({modal:true},'');}
function closeModal(){modal.classList.remove('open');}
document.getElementById('closeBtn').onclick=()=>history.back();
window.addEventListener('popstate',()=>{if(modal.classList.contains('open'))closeModal();});
document.querySelectorAll('[data-event]').forEach(b=>b.onclick=()=>{const d=DATA.events[b.dataset.event];openModal(d.t,d.s,`<div class="grid"><div class="info full"><h3>사건 요약</h3>${d.body.map(p=>`<p>${p}</p>`).join('')}</div><div class="info"><h3>핵심 의미</h3><ul><li>${d.s.split(' · ').join('</li><li>')}</li></ul></div><div class="info"><h3>연결 탐험</h3><ul>${d.links.map(x=>`<li>${x}</li>`).join('')}</ul></div></div>`)});
document.querySelectorAll('[data-hub]').forEach(b=>b.onclick=()=>{const d=DATA.hubs[b.dataset.hub];openModal(d.t,d.s,`<div class="grid"><div class="info"><h3>주요 지점</h3><ul>${d.items.map(x=>`<li>${x}</li>`).join('')}</ul></div><div class="info"><h3>핵심 의미</h3><p>${d.meaning}</p></div><div class="info full"><h3>주제 연결 탐험</h3><ul>${d.explore.map(x=>`<li>${x}</li>`).join('')}</ul></div></div>`)});
const pages={overview:['창조시대 개요','창세기 1~11장의 큰 흐름',`<div class="overview"><p><b>창조시대 Matrix</b>는 창조에서 바벨탑까지의 흐름을 한 장의 상징 지도로 보여줍니다.</p><p>핵심 흐름은 <b>창조 → 타락 → 죄의 확산 → 홍수 심판 → 언약 → 바벨탑 → 열방 분산 → 아브라함 소명</b>입니다.</p></div>`],timeline:['연대표 보기','창조부터 바벨탑까지',`<div class="grid"><div class="info full"><h3>핵심사건 5단계</h3><ol><li>창조</li><li>타락</li><li>가인과 아벨</li><li>노아홍수</li><li>바벨탑</li></ol></div></div>`],verses:['성경 본문','관련 성경 구절',`<div class="grid"><div class="info"><h3>창조</h3><p>창세기 1:1~2:3</p></div><div class="info"><h3>타락</h3><p>창세기 3장</p></div><div class="info"><h3>가인과 아벨</h3><p>창세기 4장</p></div><div class="info"><h3>노아홍수</h3><p>창세기 6~9장</p></div><div class="info"><h3>바벨탑</h3><p>창세기 11:1~9</p></div></div>`],mapGuide:['전체 지도','상징 공간 설명',`<div class="grid"><div class="info"><h3>에덴동산</h3><p>하나님의 임재와 생명의 공간</p></div><div class="info"><h3>에덴동산 동쪽</h3><p>추방과 회복을 기다리는 길</p></div><div class="info"><h3>아라랏산</h3><p>방주가 머문 곳, 새로운 시작</p></div><div class="info"><h3>시날 평지</h3><p>바벨탑이 세워진 곳, 열방 분산</p></div></div>`],explore:['연결 탐험','성경 전체 흐름으로 확장',`<div class="grid"><div class="info"><h3>창조의 흐름</h3><p>창조 → 새창조 → 새예루살렘</p></div><div class="info"><h3>임재의 흐름</h3><p>에덴동산 → 성막 → 성전 → 예수 그리스도 → 새예루살렘</p></div><div class="info"><h3>구원의 흐름</h3><p>방주 → 출애굽 → 십자가 → 최종 구원</p></div><div class="info"><h3>열방의 흐름</h3><p>바벨탑 → 아브라함 → 오순절 → 세계선교</p></div></div>`],notes:['메모 & 노트','현재 버전은 로컬 메모 저장 지원',`<div class="info full"><h3>나만의 메모</h3><textarea id="memo" style="width:100%;height:220px;border-radius:12px;background:rgba(0,0,0,.35);color:#fff;border:1px solid rgba(255,255,255,.18);padding:14px;font:inherit"></textarea><p><button class="pill" onclick="localStorage.setItem('creationMemo',document.getElementById('memo').value)">저장</button></p></div>`],next:['다음 시대 예고','족장시대 Matrix로 이어지는 연결점',`<div class="info full"><h3>왜 아브라함인가?</h3><p>바벨탑 이후 인류는 흩어졌고, 하나님은 한 사람 아브라함을 부르셔서 모든 민족을 향한 복의 통로로 삼으십니다.</p><p><b>다음 Matrix:</b> 족장시대 — 아브라함, 이삭, 야곱, 요셉</p></div>`],help:['도움말','사용 방법',`<div class="overview"><p>지도 위의 numbered 도트를 누르면 핵심사건 상세가 열립니다. 오른쪽 허브 버튼을 누르면 창조·타락·심판·언약·열방 허브로 바로 들어갑니다.</p><p>하단 메뉴는 개요, 연대표, 성경 본문, 지도 설명, 연결 탐험, 메모로 구성되어 있습니다.</p></div>`]};
document.querySelectorAll('[data-modal]').forEach(b=>b.onclick=()=>{const p=pages[b.dataset.modal];openModal(p[0],p[1],p[2]);if(b.dataset.modal==='notes')setTimeout(()=>{document.getElementById('memo').value=localStorage.getItem('creationMemo')||''},0)});
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
</script>
</body>
</html>
