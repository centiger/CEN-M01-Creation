<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>창조시대 허브</title>
<meta name="theme-color" content="#071017" />
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;background:#071017;color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Noto Sans KR","Apple SD Gothic Neo",sans-serif}body{display:flex;justify-content:center}.phone{width:100%;max-width:560px;min-height:100svh;background:linear-gradient(180deg,#0b1520,#06090e);position:relative;overflow-x:hidden}.top{position:sticky;top:0;z-index:10;padding:14px 14px 12px;background:linear-gradient(180deg,rgba(7,16,23,.98),rgba(7,16,23,.82));backdrop-filter:blur(12px);border-bottom:1px solid rgba(247,216,137,.22);display:flex;gap:8px;align-items:center}.top button{border:1px solid rgba(247,216,137,.28);background:rgba(255,255,255,.07);color:#ffe8a8;border-radius:999px;padding:9px 12px;font-weight:850}.top .ttl{flex:1;text-align:center;font-weight:950;color:#f7d889;letter-spacing:-.04em}.hero{margin:16px;border:1px solid rgba(247,216,137,.25);border-radius:24px;padding:18px;background:radial-gradient(circle at top,rgba(247,216,137,.16),rgba(255,255,255,.05) 42%,rgba(0,0,0,.15));box-shadow:0 20px 50px rgba(0,0,0,.35)}.hero h1{margin:0;font-size:30px;letter-spacing:-.07em}.hero .sub{margin-top:6px;color:#f7d889;font-weight:900}.verse{margin-top:14px;padding:12px;border-radius:16px;background:rgba(247,216,137,.10);border:1px solid rgba(247,216,137,.20);line-height:1.55;color:#fff3c4;font-weight:800}.mapBox{margin:16px;border-radius:22px;overflow:hidden;border:1px solid rgba(255,255,255,.16);background:#000;box-shadow:0 18px 45px rgba(0,0,0,.38)}.mapBox img{display:block;width:100%;height:auto}.caption{padding:12px 14px;color:rgba(255,255,255,.78);font-size:13px;line-height:1.6;background:rgba(0,0,0,.32)}.section{margin:16px;border:1px solid rgba(255,255,255,.13);border-radius:22px;padding:16px;background:rgba(255,255,255,.055)}.section h2{margin:0 0 10px;color:#f7d889;font-size:18px;letter-spacing:-.04em}.flow{display:grid;gap:8px}.flow .item{padding:11px 12px;border-radius:14px;background:rgba(255,255,255,.075);border:1px solid rgba(255,255,255,.09);font-weight:800;line-height:1.35}.bul{margin:0;padding-left:18px;line-height:1.7;color:rgba(255,255,255,.88)}.chips{display:flex;gap:8px;flex-wrap:wrap}.chip{padding:8px 10px;border-radius:999px;border:1px solid rgba(247,216,137,.24);background:rgba(247,216,137,.08);color:#f8e4aa;font-size:13px;font-weight:850}.bottom{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px 16px 28px}.bigBtn{border:1px solid rgba(247,216,137,.32);background:linear-gradient(180deg,rgba(247,216,137,.16),rgba(255,255,255,.06));color:#fff;border-radius:18px;padding:14px 12px;font-size:15px;font-weight:950}.bigBtn.next{grid-column:span 2;background:linear-gradient(180deg,rgba(83,55,18,.94),rgba(22,14,6,.92));color:#ffe8a8}.dialog{position:fixed;inset:0;display:none;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.55);z-index:50}.dialog.show{display:flex}.panel{width:100%;max-width:560px;max-height:70svh;overflow:auto;border-radius:24px 24px 0 0;background:#101923;border:1px solid rgba(247,216,137,.25);padding:18px}.panel h2{margin:0 0 12px;color:#f7d889}.hubList{display:grid;gap:10px}.hubOpt{border:1px solid rgba(255,255,255,.14);border-radius:16px;background:rgba(255,255,255,.06);color:#fff;padding:13px;text-align:left;font-weight:900}.hubOpt small{display:block;margin-top:4px;color:rgba(255,255,255,.65);font-weight:700}.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#ffe8a8;border:1px solid rgba(247,216,137,.3);padding:10px 14px;border-radius:999px;display:none;z-index:60;font-weight:850}.toast.show{display:block}

.exploreCard{padding:12px 13px;border-radius:14px;background:rgba(255,255,255,.075);border:1px solid rgba(247,216,137,.18);margin-bottom:9px}
.exploreCard b{display:block;color:#f7d889;font-size:16px;margin-bottom:6px}
.exploreCard p{margin:0;color:rgba(255,255,255,.9);font-size:15px;line-height:1.65;font-weight:750;white-space:pre-line}
</style>

<style id="m01-button-text-v2-fix">
/* M01 메인 버튼명 v2 */
.action-btn,
.event-btn,
.hub-btn,
button[class*="btn"],
a[class*="btn"]{
  min-width: 96px;
  white-space: nowrap;
}
.action-btn span,
.event-btn span,
.hub-btn span,
button[class*="btn"] span,
a[class*="btn"] span{
  white-space: nowrap;
}
</style>

</head>
<body><main class="phone">
<header class="top"><button onclick="location.href='../index.html'">← Matrix</button><div class="ttl">창조시대 허브</div><button onclick="openList()">허브목록</button></header>
<section class="hero"><h1 id="title"></h1><div class="sub" id="subtitle"></div><div class="verse" id="verse"></div></section>
<section class="mapBox"><img id="map" alt="허브 지도"><div class="caption" id="caption"></div></section>
<section class="section"><h2>핵심사건</h2><div class="flow" id="events"></div></section>
<section class="section"><h2>핵심의미</h2><ul class="bul" id="meanings"></ul></section>
<section class="section"><h2>Meaning</h2><div id="connections"></div></section>
<section class="section"><h2>파노라마</h2><div id="integration"></div></section>
<section class="section"><h2>관련성경</h2><div class="chips" id="references"></div></section>
<div class="bottom"><button class="bigBtn" onclick="location.href='../index.html'">매트릭스로</button><button class="bigBtn" onclick="openList()">허브목록</button><button class="bigBtn next" id="nextBtn"></button></div>
</main>
<div class="dialog" id="dialog" onclick="if(event.target.id==='dialog')closeList()"><div class="panel"><h2>창조시대 허브 목록</h2><div class="hubList" id="hubList"></div><button class="bigBtn" style="margin-top:14px;width:100%" onclick="closeList()">닫기</button></div></div><div class="toast" id="toast"></div>
<script src="./js/app.js"></script>
</body></html>
